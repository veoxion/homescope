services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: homescope-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homescope
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: homescope-backend
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/homescope

  frontend:
    build: ./frontend
    container_name: homescope-frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local

volumes:
  pgdata:
